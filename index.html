<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Gallery</title>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px;}
#adminBtn{position:fixed;top:10px;right:10px;background:#111827;color:#fff;padding:10px;border-radius:8px;cursor:pointer;}
#panel{position:fixed;top:60px;right:10px;background:#fff;padding:15px;border-radius:10px;display:none;width:300px;box-shadow:0 5px 20px rgba(0,0,0,0.2);}
input{width:100%;padding:8px;margin-bottom:10px;}
button{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:60px;}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
img{width:100%;border-radius:8px;}
</style>
</head>
<body>

<div id="adminBtn" onclick="toggle()">Admin</div>

<div id="panel">
  <input id="link" placeholder="Paste Drive folder link">
  <button onclick="load()">Load</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
function toggle(){
  const p=document.getElementById("panel");
  p.style.display = p.style.display==="block"?"none":"block";
}

async function load(){
  const link=document.getElementById("link").value;

  const res = await fetch("/folder?link="+encodeURIComponent(link));
  const data = await res.json();

  const g=document.getElementById("gallery");
  g.innerHTML="";

  data.forEach(f=>{
    const img=`https://drive.google.com/uc?id=${f.id}`;
    g.innerHTML+=`
      <div class="card">
        <img src="${img}">
        <p>${f.name}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
